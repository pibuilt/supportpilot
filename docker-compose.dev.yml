services:
  api-gateway:
    build: .
    container_name: sp_api_gateway

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis
      - llm-service
      - ai-service

    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile

    container_name: sp_ai_service

    ports:
      - "8002:8000"

    env_file:
      - .env

    depends_on:
      - redis

    restart: unless-stopped

  celery-worker:
    build: .

    container_name: sp_celery_worker

    env_file:
      - .env

    depends_on:
      - redis
      - postgres

    command: >
      celery
      -A app.worker
      worker
      --pool=solo
      --loglevel=info

    restart: unless-stopped
  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile

    container_name: sp_llm_service

    ports:
      - "8001:8001"

    env_file:
      - .env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16

    container_name: sp_postgres

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: supportpilot-redis

    ports:
      - "6379:6379"

    restart: unless-stopped
