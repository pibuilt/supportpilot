services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api

    container_name: sp_frontend

    ports:
      - "8080:80"

    environment:
      VITE_API_BASE_URL: /api

    depends_on:
      - api-gateway

    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: sp_api_gateway

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supportpilot

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      llm-service:
        condition: service_started
      ai-service:
        condition: service_started

    restart: unless-stopped

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile

    container_name: sp_ai_service

    ports:
      - "8002:8000"

    env_file:
      - .env

    depends_on:
      - redis

    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile

    container_name: sp_celery_worker

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supportpilot

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    command: >
      celery
      -A app.worker
      worker
      --pool=solo
      --loglevel=info

    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: sp_migrate

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/supportpilot

    depends_on:
      postgres:
        condition: service_healthy

    command: alembic upgrade head
    profiles:
      - migration

    restart: "no"
  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile

    container_name: sp_llm_service

    ports:
      - "8001:8001"

    env_file:
      - .env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16

    container_name: sp_postgres

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: supportpilot-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

  prometheus:
    image: prom/prometheus

    container_name: sp_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - api-gateway

    restart: unless-stopped

  grafana:
    image: grafana/grafana

    container_name: sp_grafana

    env_file:
      - .env

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    restart: unless-stopped
